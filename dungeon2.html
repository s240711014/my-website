<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Dungeon</title>
        <link rel="stylesheet" href="./dungeon.css">
    </head>
    <body onload="init()">
        <canvas id="maze" width="900" height="600"></canvas>

        <h2>ゲーム説明</h2>
        <p>
        プレイヤーを操作し、ダンジョンの出口を目指そう。<br>
        ダンジョンには5つの部屋があり、それぞれに宝箱が1つ置かれています。<br>
        宝箱の中には「鍵」または「ミミック」が入っています。<br>
        鍵は全部で2本、ミミックは3体です。<br>
        ミミックを開けるとライフが1減り、ライフが0になるとゲームオーバーです。<br>
        鍵を2本集めた状態で出口へ行くとゲームクリアになります。
        </p>
        <h3>操作方法</h3>
        <ul>
            <li>← ↑ → ↓ ：移動</li>
            <li>スペースキー：宝箱・ゴールを調べる</li>
        </ul>

        <script src="dungeon2.js" type="text/javascript"></script>
        <img id="hero0" src="hero0.png" style="display: none">
        <img id="hero1" src="hero1.png" style="display: none">
        <img id="hero2" src="hero2.png" style="display: none">
        <img id="hero3" src="hero3.png" style="display: none">
    </body>
</html>

<!--ゲームの工夫点
・スタート地点、ゴール地点、5つの宝箱部屋をランダムに配置するようにした。
・スタート地点とゴール地点は、できるだけ離れた位置になるよう座標を計算し、できる限り長く探索できるようにした。
・各部屋の中央には宝箱を配置し、ランダムで「鍵」または「ミミック」を設定することで、運要素を取り入れた。
・部屋や宝箱の座標を配列で管理し、for文などの繰り返し処理を利用することで、効率よく配置や判定を行えるようにした。-->
